<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وكيل الذكاء الاصطناعي للمتصفح</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
        }
        #chat-container {
            width: 30%;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #ccc;
        }
        #chat-messages {
            flex-grow: 1;
            padding: 10px;
            overflow-y: auto;
        }
        #chat-input {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ccc;
        }
        #chat-input input {
            flex-grow: 1;
            border: 1px solid #ccc;
            padding: 8px;
            border-radius: 5px;
        }
        #chat-input button {
            margin-right: 10px;
            padding: 8px 12px;
            border: none;
            background-color: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        #browser-container {
            width: 70%;
            padding: 10px;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="chat-messages"></div>
        <div id="chat-input">
            <input type="text" id="message-input" placeholder="اكتب أمرك هنا...">
            <button id="send-button">إرسال</button>
        </div>
    </div>
    <div id="browser-container">
        <video id="browser-stream" autoplay muted></video>
    </div>
    <script>
        const stream = document.getElementById('browser-stream');
        stream.src = 'https://<your-replit-url>/stream';
    </script>
    <script>
        const chatMessages = document.getElementById('chat-messages');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');

        const ws = new WebSocket('wss://<your-replit-url>');

        ws.onopen = () => {
            console.log('Connected to the server');
        };

        ws.onmessage = (event) => {
            const message = document.createElement('div');
            message.textContent = `AI: ${event.data}`;
            chatMessages.appendChild(message);
        };

        sendButton.addEventListener('click', () => {
            const message = messageInput.value;
            if (message.trim() !== '') {
                const messageElement = document.createElement('div');
                messageElement.textContent = `You: ${message}`;
                chatMessages.appendChild(messageElement);

                ws.send(message);
                messageInput.value = '';
            }
        });
    </script>
</body>
</html>
